version: '3'

services:

  app:
    build:
      context: ./.devcontainer
      dockerfile: Dockerfile

    ports:
      - "8080:80"

    volumes:
      - ./src:/var/www/html

    depends_on:
      - db

  db:
    image: mariadb:10.6

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: magento
      MYSQL_USER: magento
      MYSQL_PASSWORD: magento

    ports:
      - "3306:3306"
